name: Deploy to GitHub Pages

# Production (main) publishes to the site root; pull requests publish to
# /pr-preview/pr-<N>/ so each PR gets its own live preview URL. Both live on
# the gh-pages branch, which GitHub Pages serves ("Deploy from a branch").

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write        # push the built site to the gh-pages branch
  pull-requests: write   # post the preview URL as a PR comment

# Don't let concurrent runs race on the gh-pages branch.
concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Skip building on a PR close event — we only need the cleanup step below.
      - uses: pnpm/action-setup@v4
        if: github.event.action != 'closed'
      - uses: actions/setup-node@v4
        if: github.event.action != 'closed'
        with:
          node-version: 22
          cache: pnpm

      # esbuild bundles src/ + three into a single self-contained dist/index.html
      - name: Build site
        if: github.event.action != 'closed'
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # main -> gh-pages root (keep any existing PR previews intact)
      - name: Deploy production
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: pr-preview/

      # pull_request -> gh-pages/pr-preview/pr-<N>/ ; auto-removed when PR closes
      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
